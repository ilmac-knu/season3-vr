<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR 가상체험 - 여행 포기</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, "Noto Sans KR", sans-serif;
      text-align: center;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      color: #ffd966;
    }

    .video-box {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #111;
    }

    .video-box iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #ffd966;
      font-size: 18px;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>여행 포기 루트</h1>

    <div class="video-box">
      <iframe
        src="https://www.youtube.com/embed/iXgWfbjMhvQ?rel=0&modestbranding=1&playsinline=1"
        allowfullscreen>
      </iframe>
    </div>

    <a href="index.html">처음 선택 화면으로 돌아가기</a>
  </div>
</body>
</html>
